<h1>
  &#64;almothafar/angular-signature-pad demo
</h1>

<form [formGroup]="form" (submit)="submit()">
  <div class="row">
    <button type="button" (click)="clear()">Clear All</button>
    <button type="submit" [disabled]="!canSubmit">Submit</button>
  </div>
  @for (item of items; track item; let idx = $index) {
    <div class="sig-container">
      <h3>{{ titles[idx] }}</h3>
      <div class="row">
        <button type="button" (click)="sigs().at(idx).randomBackgroundColor()">Change Background</button>
        <button type="button" (click)="sigs().at(idx).clear()" [disabled]="!form.controls['signatureField'+idx].valid">Clear</button>
      </div>
      <div class="row" #sigContainer>
        <div class="col">
          <app-signature-field [options]="item.options" [imageType]="item.imageType" [quality]="item.quality" [formControlName]="'signatureField'+idx"
                               (signatureChanged)="updateSigPreview(idx, $event)" />
        </div>
        <div class="col">
          <app-signature-view [signature]="result?.at(idx)" />
        </div>
      </div>
    </div>
  }
  @if (submitted) {
    <div class="submit-result" #submitResult>
      <div class="submit-banner">
        <span class="submit-icon">✓</span>
        <span>Submitted successfully — full data logged to browser console <kbd>F12</kbd></span>
      </div>
      <pre class="submit-data">{{ displayResult }}</pre>
    </div>
  }
</form>
